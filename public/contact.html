<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
</head>
<body>
<h1>Contact Me</h1>

<form action="/submit" method="POST">

    <!-- Add a label + text input for "Name"
         Hint: <label for="name">Name</label>
               <input type="text" id="name" name="name" required> -->
    <label for="name">Name</label>
    <input id="name" name="name" required type="text"><br><br>

    <!-- Add a label + email input for "Email" -->
    <label for="email">Email</label>
    <input id="email" name="email" required type="email"><br><br>

    <!-- Add a label + <textarea> for "Message" (rows=5, cols=40) -->
    <label for="message">Message</label>
    <textarea cols="40" id="message" name="message" required rows="5"></textarea><br><br>

    <!-- Add a label + <select> dropdown for "Subject"
         with options: General, Bug Report, Feature Request -->
    <label for="subject">Subject</label>
    <select id="subject" name="subject" required>
        <option value="">Select subject</option>
        <option value="general">General</option>
        <option value="bug">Bug Report</option>
        <option value="feature">Feature Request</option>
    </select><br><br>

    <!-- Add a submit button -->
    <input type="submit" value="Send Message">

</form>

<p><a href="index.html">← Back to Home</a></p>
</body>
</html>
